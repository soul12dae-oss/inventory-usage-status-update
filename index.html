<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 재고 관리 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { padding-bottom: 70px; }
        .tab-btn.active { color: #2563eb; font-weight: bold; border-top: 2px solid #2563eb; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- 상단 헤더 -->
    <header class="bg-slate-800 text-white p-4 sticky top-0 z-40 shadow-md flex justify-between items-center">
        <h1 id="page-title" class="text-lg font-bold">📦 통합 재고관리</h1>
        <div class="text-xs text-emerald-400 flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span>시스템 정상 구동 중 (자동 저장)</span>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="max-w-4xl mx-auto p-4 mt-2">

        <!-- ================= [1. 홈: 제품 등록] ================= -->
        <div id="view-home" class="tab-view space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
                <h2 class="text-sm font-bold text-gray-600 mb-3 flex items-center gap-1"><span class="material-icons text-base">add_box</span> 신규 제품 마스터 등록</h2>
                <div class="space-y-3">
                    <input type="text" id="reg-name" placeholder="제품명 입력 (필수)" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-blue-500">
                    <input type="text" id="reg-spec" placeholder="기본 상세사양 입력 (선택)" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-blue-500">
                    <button id="btn-reg-submit" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-medium py-2.5 rounded-lg text-sm transition cursor-pointer">제품 등록하기</button>
                </div>
            </div>
        </div>

        <!-- ================= [2. 입고 관리] ================= -->
        <div id="view-in" class="tab-view hidden space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
                <h2 class="text-sm font-bold text-emerald-700 mb-3 flex items-center gap-1"><span class="material-icons text-base">file_download</span> 자재 입고 처리</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">제품명</label>
                        <input type="text" id="in-name" placeholder="제품명 입력" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">상세사양</label>
                        <input type="text" id="in-spec" placeholder="상세사양 입력 (빈칸 가능)" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-emerald-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">입고갯수</label>
                        <input type="number" id="in-qty" placeholder="입고갯수" value="1" min="1" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-emerald-500">
                    </div>
                    <button id="btn-in-submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-lg text-sm transition cursor-pointer shadow-md">📥 입고 데이터 저장</button>
                </div>
            </div>
        </div>

        <!-- ================= [3. 출고 관리] ================= -->
        <div id="view-out" class="tab-view hidden space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
                <h2 class="text-sm font-bold text-amber-700 mb-3 flex items-center gap-1"><span class="material-icons text-base">file_upload</span> 자재 출고 처리</h2>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">모델명</label>
                        <input type="text" id="out-model" placeholder="모델명 입력" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">상세사양</label>
                        <input type="text" id="out-spec" placeholder="상세사양 입력 (빈칸 가능)" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">출고갯수</label>
                        <input type="number" id="out-qty" placeholder="출고갯수" value="1" min="1" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:outline-amber-500">
                    </div>
                    <button id="btn-out-submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2.5 rounded-lg text-sm transition cursor-pointer shadow-md">📤 출고 데이터 저장</button>
                </div>
            </div>
        </div>

        <!-- ================= [4. 재고 현황] ================= -->
        <div id="view-status" class="tab-view hidden space-y-3">
            <div class="p-2.5 bg-white rounded-lg border border-gray-300 flex items-center px-3">
                <span class="material-icons text-gray-400 text-lg mr-2">search</span>
                <input type="text" id="search-bar" placeholder="제품명 검색..." class="w-full bg-transparent text-sm focus:outline-none">
            </div>
            
            <div id="status-container" class="space-y-2">
                <!-- 항목 터치 시 변동 일시 로그가 아래로 펼쳐짐 -->
            </div>
        </div>

    </main>

    <!-- 하단 고정 네비게이션 바 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg z-50">
        <div class="max-w-md mx-auto flex justify-around text-center">
            <button onclick="switchTab('home')" class="tab-btn flex-1 py-2 text-gray-400 text-xs flex flex-col items-center" id="nav-home">
                <span class="material-icons">home</span>홈
            </button>
            <button onclick="switchTab('in')" class="tab-btn flex-1 py-2 text-gray-400 text-xs flex flex-col items-center" id="nav-in">
                <span class="material-icons">file_download</span>입고
            </button>
            <button onclick="switchTab('out')" class="tab-btn flex-1 py-2 text-gray-400 text-xs flex flex-col items-center" id="nav-out">
                <span class="material-icons">file_upload</span>출고
            </button>
            <button onclick="switchTab('status')" class="tab-btn flex-1 py-2 text-gray-400 text-xs flex flex-col items-center" id="nav-status">
                <span class="material-icons">inventory_2</span>재고현황
            </button>
        </div>
    </nav>

    <script>
        // 데이터 저장소 강제 연동 (브라우저가 켜져있는 한 무조건 영구 보존)
        let products = JSON.parse(localStorage.getItem('final_products')) || [];
        let historyLogs = JSON.parse(localStorage.getItem('final_history')) || [];

        // 실시간 한국 시간 가져오기 함수 (일시 자동 등록용)
        function getNowDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 데이터 영구 저장 함수
        function saveToStorage() {
            localStorage.setItem('final_products', JSON.stringify(products));
            localStorage.setItem('final_history', JSON.stringify(historyLogs));
            renderStatus();
        }

        // [1] 홈 화면: 제품 등록하기
        document.getElementById('btn-reg-submit').addEventListener('click', () => {
            const name = document.getElementById('reg-name').value.trim();
            const spec = document.getElementById('reg-spec').value.trim() || '-';

            if(!name) { alert('제품명은 꼭 입력해 주세요!'); return; }

            // 기존에 같은 이름이 있는지 확인
            let target = products.find(p => p.name === name);
            if(!target) {
                products.push({ name: name, spec: spec, currentQty: 0 });
                alert(`${name} 제품이 새로 시스템에 등록되었습니다.`);
            } else {
                alert('이미 등록되어 있는 제품명입니다.');
            }

            document.getElementById('reg-name').value = '';
            document.getElementById('reg-spec').value = '';
            saveToStorage();
        });

        // [2] 입고 페이지 저장 버튼 클릭
        document.getElementById('btn-in-submit').addEventListener('click', () => {
            const name = document.getElementById('in-name').value.trim() || '미지정 제품';
            const spec = document.getElementById('in-spec').value.trim() || '-';
            const qty = parseInt(document.getElementById('in-qty').value) || 0;

            if(qty <= 0) { alert('입고 갯수를 확인해 주세요.'); return; }

            const currentTime = getNowDateTime(); // ⏱️ 시간 자동 기록

            // 1. 재고 마스터 업데이트
            let target = products.find(p => p.name === name);
            if(!target) {
                target = { name: name, spec: spec, currentQty: qty };
                products.push(target);
            } else {
                target.currentQty += qty;
            }

            // 2. 변동 히스토리 기록 추가
            historyLogs.unshift({
                productName: name,
                type: '입고',
                spec: spec,
                qty: qty,
                date: currentTime // 자동 등록된 일시 저장
            });

            // 입력창 청소
            document.getElementById('in-name').value = '';
            document.getElementById('in-spec').value = '';
            document.getElementById('in-qty').value = '1';

            alert('입고 처리가 완료되어 저장되었습니다!');
            saveToStorage();
        });

        // [3] 출고 페이지 저장 버튼 클릭
        document.getElementById('btn-out-submit').addEventListener('click', () => {
            const modelName = document.getElementById('out-model').value.trim() || '미지정 모델';
            const spec = document.getElementById('out-spec').value.trim() || '-';
            const qty = parseInt(document.getElementById('out-qty').value) || 0;

            if(qty <= 0) { alert('출고 갯수를 확인해 주세요.'); return; }

            const currentTime = getNowDateTime(); // ⏱️ 시간 자동 기록

            // 1. 재고 마스터 업데이트 (출고는 재고에서 차감, 모델명을 제품명 기조로 매칭)
            let target = products.find(p => p.name === modelName);
            if(!target) {
                target = { name: modelName, spec: spec, currentQty: -qty };
                products.push(target);
            } else {
                target.currentQty -= qty;
            }

            // 2. 변동 히스토리 기록 추가
            historyLogs.unshift({
                productName: modelName,
                type: '출고',
                spec: spec,
                qty: qty,
                date: currentTime // 자동 등록된 일시 저장
            });

            document.getElementById('out-model').value = '';
            document.getElementById('out-spec').value = '';
            document.getElementById('out-qty').value = '1';

            alert('출고 처리가 완료되어 저장되었습니다!');
            saveToStorage();
        });

        // [4] 재고 현황 그리기 (터치하면 아래로 일시/기록 완벽 표출)
        function renderStatus() {
            const container = document.getElementById('status-container');
            const keyword = document.getElementById('search-bar').value.toLowerCase();
            container.innerHTML = '';

            const filtered = products.filter(p => p.name.toLowerCase().includes(keyword));

            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">등록된 내역이 없습니다. 먼저 입/출고 저장을 진행해 보세요.</div>`;
                return;
            }

            filtered.forEach((p, idx) => {
                // 현재 자재명과 매칭되는 입출고 이력만 시간순 필터링
                const matchingLogs = historyLogs.filter(l => l.productName === p.name);

                let logHtml = '';
                if(matchingLogs.length === 0) {
                    logHtml = `<div class="p-2 text-xs text-gray-400 text-center">기록된 이력이 없습니다.</div>`;
                } else {
                    matchingLogs.forEach(l => {
                        const typeColor = l.type === '입고' ? 'text-emerald-600 bg-emerald-50' : 'text-rose-600 bg-rose-50';
                        logHtml += `
                            <div class="flex justify-between items-center py-2.5 border-b border-gray-100 last:border-none text-xs">
                                <div>
                                    <span class="px-1.5 py-0.5 rounded font-black text-[10px] mr-2 ${typeColor}">${l.type}</span>
                                    <span class="text-gray-600 font-mono font-bold">${l.date}</span> <!-- ⏱️ 여기에 날짜/시간 강제 출력 -->
                                </div>
                                <div class="text-right">
                                    <span class="font-bold text-gray-900">${l.qty} 개</span>
                                    <span class="text-[10px] text-gray-400 block mt-0.5">상세: ${l.spec}</span>
                                </div>
                            </div>
                        `;
                    });
                }

                const pCard = document.createElement('div');
                pCard.className = "bg-white rounded-xl border border-gray-200 shadow-2xs overflow-hidden";
                pCard.innerHTML = `
                    <div onclick="window.toggleAccordion('panel-${idx}')" class="p-4 flex justify-between items-center bg-white hover:bg-gray-50 active:bg-gray-100 transition-colors cursor-pointer select-none">
                        <div>
                            <h3 class="text-sm font-bold text-gray-900">${p.name}</h3>
                            <p class="text-xs text-gray-400 mt-0.5">상세스펙: ${p.spec}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-black text-blue-600">${p.currentQty} 개</span>
                            <span class="material-icons text-gray-400 text-sm" id="icon-panel-${idx}">expand_more</span>
                        </div>
                    </div>
                    <div id="panel-${idx}" class="hidden bg-gray-50 border-t border-gray-100 p-4 space-y-1">
                        <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">📜 변동 히스토리 내역 (시간 자동포함)</div>
                        ${logHtml}
                    </div>
                `;
                container.appendChild(pCard);
            });
        }

        // 아코디언 토글 제어
        window.toggleAccordion = function(panelId) {
            const panel = document.getElementById(panelId);
            const icon = document.getElementById('icon-' + panelId);
            if(panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                icon.innerText = 'expand_less';
            } else {
                panel.classList.add('hidden');
                icon.innerText = 'expand_more';
            }
        };

        // 검색 기능
        document.getElementById('search-bar').addEventListener('input', renderStatus);

        // 하단 탭 스위칭 
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-view').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById('view-' + tabId).classList.remove('hidden');
            document.getElementById('nav-' + tabId).classList.add('active');
            
            const titles = { home: '🏠 홈: 제품 마스터', in: '📥 입고 관리', out: '📤 출고 관리', status: '📋 현재고 현황' };
            document.getElementById('page-title').innerText = titles[tabId];
        };

        // 최초 로딩 실행
        renderStatus();
    </script>
</body>
</html>
