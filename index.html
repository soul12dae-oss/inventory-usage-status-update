<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>출고관리 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-800 min-h-screen">

    <!-- 상단 바 -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold text-gray-900">출고관리 I</h1>
                <span id="current-date" class="text-gray-400 text-sm font-mono"></span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="location.reload()" class="px-3 py-1.5 border border-gray-300 rounded text-xs font-medium bg-white hover:bg-gray-50 cursor-pointer">새로고침</button>
                <div class="text-[11px] text-gray-400 flex items-center gap-1">
                    <span id="sync-status" class="w-2 h-2 rounded-full bg-gray-400"></span>
                    <span id="sync-text">로컬 저장 모드</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

        <!-- 입력 섹션 (상단 배치) -->
        <section class="bg-white p-5 rounded-lg border border-gray-200 shadow-xs">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-gray-500">📋 출고 자재 정보 입력 (빈칸 허용)</h2>
                <button id="btn-submit" class="px-5 py-2 bg-[#d97706] hover:bg-[#b45309] text-white text-sm font-bold rounded shadow-sm transition cursor-pointer">출고 저장</button>
            </div>
            
            <!-- PC 3열 / 모바일 1열 반응형 레이아웃 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">자재명</label>
                    <input type="text" id="in-name" placeholder="예: 자동밸브" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-amber-600 bg-gray-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">모델명</label>
                    <input type="text" id="in-model" placeholder="예: ITQ 0100-125BF" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-amber-600 bg-gray-50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">상세사양 / RACK</label>
                    <input type="text" id="in-spec" placeholder="예: (SUS/PTFE) AC 220V / 기타" class="w-full px-3 py-2 border border-gray-300 rounded text-sm focus:outline-amber-600 bg-gray-50">
                </div>
            </div>
        </section>

        <!-- 리스트 세션 (PC 테이블 형태 / 모바일 카드 형태 자동 변환) -->
        <section class="bg-white rounded-lg border border-gray-200 shadow-xs overflow-hidden">
            <div class="p-4 bg-gray-50 border-b border-gray-200">
                <h3 class="text-sm font-bold text-gray-700">출고 완료 이력</h3>
            </div>

            <!-- PC용 테이블 뷰 (화면이 넓을 때만 보임) -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-700 text-white text-xs font-semibold">
                            <th class="p-3 w-12 text-center">#</th>
                            <th class="p-3">자재명</th>
                            <th class="p-3">모델명</th>
                            <th class="p-3">상세사양 / RACK</th>
                            <th class="p-3 w-48">출고일시</th>
                            <th class="p-3 w-12 text-center">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="pc-table-body" class="divide-y divide-gray-200 text-sm">
                        <!-- 데이터가 여기에 쌓임 -->
                    </tbody>
                </table>
            </div>

            <!-- 모바일용 리스트 뷰 (화면이 작을 때 보임) -->
            <div id="mobile-list-body" class="block md:hidden divide-y divide-gray-200">
                <!-- 모바일 전용 카드 레이아웃 쌓임 -->
            </div>
        </section>

    </main>

    <!-- Firebase 및 데이터 처리 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 날짜 표시
        document.getElementById('current-date').innerText = new Date().toISOString().split('T')[0];

        // --- 데이터 배열 (로컬 저장소 백업용) ---
        let baseData = JSON.parse(localStorage.getItem('out_history')) || [];

               // ⚠️ 상윤님의 Firebase 프로젝트 설정 값으로 교체하세요!
        const firebaseConfig = {
            apiKey: "jsy000818",
            authDomain: "jsy000818",
            projectId: "jsy000818",
            storageBucket: "jsy000818",
            messagingSenderId: "jsy000818",
            appId: "jsy000818"
        };

        let db = null;
        let isFirebaseActive = false;

        // Firebase 연결 시도
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                isFirebaseActive = true;
                
                // 클라우드 실시간 감지 구독
                const q = query(collection(db, "out_logs"), orderBy("timestamp", "desc"));
                onSnapshot(q, (snapshot) => {
                    baseData = [];
                    snapshot.forEach(docSnap => {
                        baseData.push({ id: docSnap.id, ...docSnap.data() });
                    });
                    localStorage.setItem('out_history', JSON.stringify(baseData));
                    document.getElementById('sync-status').className = "w-2 h-2 rounded-full bg-emerald-500";
                    document.getElementById('sync-text').innerText = "실시간 클라우드 모드";
                    renderData();
                });
            } catch (e) {
                console.log("Firebase 로드 실패, 로컬 모드로 전환합니다.");
            }
        }

        if(!isFirebaseActive) {
            // 로컬 모드일 때 첫 화면 띄우기
            renderData();
        }

        // --- 데이터 화면에 그리기 (PC / 모바일 분기 수용) ---
        function renderData() {
            const pcBody = document.getElementById('pc-table-body');
            const mobileBody = document.getElementById('mobile-list-body');
            
            pcBody.innerHTML = '';
            mobileBody.innerHTML = '';

            if (baseData.length === 0) {
                const emptyRow = `<tr><td colspan="6" class="text-center py-12 text-gray-400">출고된 내역이 없습니다. 항목을 적고 출고 저장을 해보세요.</td></tr>`;
                pcBody.innerHTML = emptyRow;
                mobileBody.innerHTML = `<div class="text-center py-12 text-gray-400 text-sm">출고된 내역이 없습니다.</div>`;
                return;
            }

            baseData.forEach((item, index) => {
                const no = baseData.length - index;
                
                // 1. PC 테이블 행 생성
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 text-gray-700";
                tr.innerHTML = `
                    <td class="p-3 text-center text-gray-400 font-mono text-xs">${no}</td>
                    <td class="p-3 font-medium text-gray-900">${item.name || '-'}</td>
                    <td class="p-3 font-mono text-xs">${item.model || '-'}</td>
                    <td class="p-3 text-gray-500">${item.spec || '-'}</td>
                    <td class="p-3 font-mono text-xs text-gray-400">${item.date}</td>
                    <td class="p-3 text-center">
                        <button onclick="window.deleteItem('${item.id}', ${index})" class="text-gray-400 hover:text-red-500 cursor-pointer">
                            <span class="material-icons text-sm">delete</span>
                        </button>
                    </td>
                `;
                pcBody.appendChild(tr);

                // 2. 모바일 카드 리스트 생성
                const card = document.createElement('div');
                card.className = "p-4 space-y-2 bg-white";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <span class="text-xs font-bold text-amber-700 bg-amber-50 px-2 py-0.5 rounded">No.${no}</span>
                        <span class="text-[11px] font-mono text-gray-400">${item.date}</span>
                    </div>
                    <div class="text-sm font-bold text-gray-900">자재명: ${item.name || '-'}</div>
                    <div class="text-xs text-gray-600">모델: ${item.model || '-'}</div>
                    <div class="text-xs text-gray-500">사양/RACK: ${item.spec || '-'}</div>
                    <div class="text-right pt-1">
                        <button onclick="window.deleteItem('${item.id}', ${index})" class="text-xs text-red-400 hover:text-red-600 font-medium cursor-pointer">내역 삭제</button>
                    </div>
                `;
                mobileBody.appendChild(card);
            });
        }

        // --- 출고 저장 버튼 클릭 이벤트 ---
        document.getElementById('btn-submit').addEventListener('click', async () => {
            const name = document.getElementById('in-name').value.trim();
            const model = document.getElementById('in-model').value.trim();
            const spec = document.getElementById('in-spec').value.trim();

            // 날짜 시간 포맷팅 (YYYY-MM-DD HH:MM:SS)
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + 
                String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                String(now.getDate()).padStart(2, '0') + ' ' + 
                String(now.getHours()).padStart(2, '0') + ':' + 
                String(now.getMinutes()).padStart(2, '0') + ':' + 
                String(now.getSeconds()).padStart(2, '0');

            const uniqueId = 'id_' + Date.now();
            const newLog = {
                id: uniqueId,
                name: name,
                model: model,
                spec: spec,
                date: dateStr,
                timestamp: new Date()
            };

            if (isFirebaseActive) {
                // 클라우드 저장
                await setDoc(doc(db, "out_logs", uniqueId), newLog);
            } else {
                // 로컬 브라우저에 저장
                baseData.unshift(newLog);
                localStorage.setItem('out_history', JSON.stringify(baseData));
                renderData();
            }

            // 입력 칸 초기화
            document.getElementById('in-name').value = '';
            document.getElementById('in-model').value = '';
            document.getElementById('in-spec').value = '';
        });

        // --- 삭제 기능 처리 (전역 윈도우 함수 등록) ---
        window.deleteItem = async function(id, localIndex) {
            if (!confirm("이 출고 기록을 삭제하시겠습니까?")) return;

            if (isFirebaseActive) {
                await deleteDoc(doc(db, "out_logs", id));
            } else {
                baseData.splice(localIndex, 1);
                localStorage.setItem('out_history', JSON.stringify(baseData));
                renderData();
            }
        };

    </script>
</body>
</html>
